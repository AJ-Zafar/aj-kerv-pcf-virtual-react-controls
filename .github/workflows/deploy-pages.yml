name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gds-rsvp-portal/package-lock.json

      - name: Install dependencies
        working-directory: gds-rsvp-portal
        run: npm ci

      - name: Build static site
        working-directory: gds-rsvp-portal
        env:
          NEXT_PUBLIC_BASE_PATH: /aj-kerv-pcf-virtual-react-controls
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gds-rsvp-portal/out
